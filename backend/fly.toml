# fly.toml — Fly.io deployment configuration for DevMatch Backend
# Run `fly launch` in the backend/ directory to initialize, then `fly deploy`

app = "devmatch-backend"
primary_region = "sin"  # Singapore — close to South Asia. Change to: iad (US East), lax (US West), fra (Europe)

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "5000"
  NODE_ENV = "production"
  # FRONTEND_URL is set via `fly secrets set` (see README)

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    timeout = "10s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
